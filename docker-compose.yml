services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jean
      POSTGRES_PASSWORD: jean
      POSTGRES_DB: jean
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jean -d jean"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  # Télécharge le modèle par défaut (voir README §2) avant de démarrer l'app.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:0.5b}
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$$OLLAMA_MODEL\""]
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      # Réseau Docker : n'utilise pas localhost du .env (réservé au dev hors Docker).
      DATABASE_URL: postgresql://jean:jean@db:5432/jean
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:0.5b}
      AUTH_SECRET: ${AUTH_SECRET:?Définissez AUTH_SECRET dans .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?Définissez AUTH_GOOGLE_ID dans .env}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?Définissez AUTH_GOOGLE_SECRET dans .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"

volumes:
  pgdata:
  ollama:
